name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Ensure Android platform exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Ensure Android assets directory exists
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch Android Gradle files
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [
              Path("android/build.gradle"),
              Path("android/app/build.gradle"),
              Path("android/capacitor-cordova-android-plugins/build.gradle"),
          ]

          for p in files:
              if not p.exists():
                  continue

              s = p.read_text()
              s = s.replace("com.android.tools.build:gradle:8.13.0", "com.android.tools.build:gradle:8.9.1")
              s = s.replace("classpath 'com.google.gms:google-services:4.4.4'\n", "")
              s = s.replace('classpath "com.google.gms:google-services:4.4.4"\n', "")
              s = s.replace("apply plugin: 'com.google.gms.google-services'\n", "")
              s = s.replace('apply plugin: "com.google.gms.google-services"\n', "")
              s = s.replace("JavaVersion.VERSION_21", "JavaVersion.VERSION_17")
              p.write_text(s)
              print(f"patched {p}")
          PY

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iran-network-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
